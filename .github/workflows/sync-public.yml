name: Sync Free to Public Repo

on:
    push:
        branches: [main]
        tags: ['*']
    workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout private repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up SSH deploy key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
              env:
                  GIT_SSH_COMMAND: 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no'

            - name: Remove premium-only files
              run: |
                  rm -rf includes/pro
                  rm -rf assets/pro
                  rm -rf update-server
                  rm -f dist/js/admin-pro.js
                  rm -f dist/js/settings-pro.js
                  rm -f dist/js/responses-pro.js
                  rm -f dist/js/analytics-pro.js
                  rm -f cf7-mate-pro.php
                  rm -f changelog-pro.txt

            - name: Commit and push to public repo
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  # Org renamed plugpress-io -> plugpressco; SSH deploy keys do
                  # not always follow GitHub's org-rename redirect on push.
                  git remote add public git@github.com:plugpressco/cf7-styler-for-divi.git

                  git add -A
                  git diff --cached --quiet && echo "No changes to sync" && exit 0

                  git commit -m "Sync free version – $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push public HEAD:main --force

            - name: Push tag to public repo
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push public "refs/tags/$TAG" --force
